name: Create Extension Release

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Title (defaults to tag)"
        required: false
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      publish_marketplace:
        description: "Publish to VS Code Marketplace"
        required: false
        type: boolean
        default: false
      publish_openvsx:
        description: "Publish to Open VSX"
        required: false
        type: boolean
        default: true

jobs:
  create-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Read version from package.json
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $pkg = Get-Content package.json | ConvertFrom-Json
          "version=$($pkg.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$($pkg.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build VSIX
        shell: pwsh
        run: |
          if ("${{ inputs.prerelease }}" -eq "true") {
            npm run prerelease
          } else {
            npm run package
          }

      - name: Extract release notes from CHANGELOG
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.version.outputs.version }}"
          $lines = Get-Content CHANGELOG.md
          $start = -1
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match "^##\s+$([regex]::Escape($version))\s*$") { $start = $i; break }
          }
          if ($start -lt 0) { throw "No '## $version' section found in CHANGELOG.md" }

          $body = @()
          for ($i = $start + 1; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match '^##\s') { break }
            $body += $lines[$i]
          }
          $notes = ($body -join "`n").Trim()
          if ([string]::IsNullOrWhiteSpace($notes)) { throw "CHANGELOG.md section for $version is empty" }
          $notes | Out-File -FilePath "notes.md" -Encoding utf8

      - name: Create Draft Release
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $releaseTitle = "${{ inputs.title }}"
          if ([string]::IsNullOrWhiteSpace($releaseTitle)) { $releaseTitle = "${{ steps.version.outputs.tag }}" }

          $releaseArgs = @()
          if ("${{ inputs.prerelease }}" -eq "true") { $releaseArgs += "--prerelease" }

          $vsix = Get-ChildItem -Filter "*.vsix" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $vsix) { throw "No .vsix produced by build step" }

          gh release create "${{ steps.version.outputs.tag }}" `
            --title $releaseTitle `
            --draft `
            @releaseArgs `
            --notes-file notes.md `
            --generate-notes `
            $vsix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Code Marketplace
        if: ${{ inputs.publish_marketplace }}
        shell: pwsh
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:VSCE_PAT)) {
            throw "VSCE_PAT secret is not set. Add it under repo Settings > Secrets and variables > Actions."
          }

          $vsix = Get-ChildItem -Filter "*.vsix" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $vsix) { throw "No .vsix found to publish" }

          $publishArgs = @(
            "publish",
            "--packagePath", $vsix,
            "--pat", $env:VSCE_PAT,
            "--no-update-package-json",
            "--target", "win32-x64"
          )
          if ("${{ inputs.prerelease }}" -eq "true") { $publishArgs += "--pre-release" }

          npx --yes @vscode/vsce @publishArgs

      - name: Publish to Open VSX
        if: ${{ inputs.publish_openvsx }}
        shell: pwsh
        env:
          OVSX_PAT: ${{ secrets.OVSX_API }}
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:OVSX_PAT)) {
            throw "OVSX_API secret is not set. Add it under repo Settings > Secrets and variables > Actions."
          }

          $vsix = Get-ChildItem -Filter "*.vsix" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $vsix) { throw "No .vsix found to publish" }

          npx --yes ovsx publish $vsix --pat $env:OVSX_PAT
