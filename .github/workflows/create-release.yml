name: Create Extension Release

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Title (defaults to tag)"
        required: false
        type: string
      summary:
        description: "Summary (appears above auto-generated notes)"
        required: false
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: true

jobs:
  create-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Read version from package.json
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $pkg = Get-Content package.json | ConvertFrom-Json
          $tag = "v$($pkg.version)"
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build VSIX
        run: npm run package

      - name: Create Draft Release
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $releaseTitle = "${{ inputs.title }}"
          if ([string]::IsNullOrWhiteSpace($releaseTitle)) { $releaseTitle = "${{ steps.version.outputs.tag }}" }

          $releaseArgs = @()
          if ("${{ inputs.prerelease }}" -eq "true") { $releaseArgs += "--prerelease" }

          if (-not [string]::IsNullOrWhiteSpace("${{ inputs.summary }}")) {
            "${{ inputs.summary }}" | Out-File -FilePath "summary.md" -Encoding utf8
            $releaseArgs += "--notes-file", "summary.md"
          }

          $vsix = Get-ChildItem -Filter "*.vsix" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $vsix) { throw "No .vsix produced by npm run package" }

          gh release create "${{ steps.version.outputs.tag }}" `
            --title $releaseTitle `
            --draft `
            @releaseArgs `
            --generate-notes `
            $vsix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
